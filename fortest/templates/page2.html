<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/style.css">

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <img src="/static/img/avl-code-logo.png" alt="AVL Code" style="height: 32px; margin-right: 8px;">
            <span>测试站点</span>
        </a>
        <ul class="navbar-nav">
            <li><a href="/">首页</a></li>
            <li><a href="/page1">子功能页 1</a></li>
            <li><a href="/page2" class="active">子功能页 2</a></li>
            <li><a href="/goto-stats" target="_blank">📊 站长统计</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">子功能页 2 - 功能介绍</div>
            <p style="color: var(--avl-text-secondary); line-height: 1.8;">
                这是测试站点的第二个子功能页面。您可以在此页面测试下载统计功能，

                <ul style="padding-left: 20px; color: var(--avl-text-secondary); line-height: 2;">

                    <li>实时数据更新 - 管理后台数据自动刷新</li>
                </ul>
            </div>
        </div>

        <div class="card">
            <div class="card-header">快速导航</div>
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                <a href="/" class="btn btn-outline">返回首页</a>

        <div style="margin-bottom: 8px;">
            AVL Code 站长统计测试站点 · 子功能页 2

        <div style="font-weight: 600; color: var(--avl-primary); font-size: 16px;">
            📊 数据已自动上报至站长统计后台
        </div>

    <script src="https://site.avlcodesite.xyz/static/js/tracker.js"></script>
