name = "avlcodesite"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定（与 Cloudflare Dashboard 远程配置保持一致）
[[d1_databases]]
binding = "DB"
database_name = "stats-db"
database_id = "63eef9ce-28de-4290-9c9e-65e522013734"

# 构建配置
[build]
command = "echo 'No build step required'"

# 限制配置
[limits]
cpu_ms = 50000
